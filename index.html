<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>日本語チャレンジ - 일본어 단어 게임</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #1a1a1a;
    color: #f5f5f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(230, 57, 70, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(230, 57, 70, 0.05) 0%, transparent 50%);
  }
  .game {
    width: 100%;
    max-width: 620px;
    background: #242424;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 1px solid #333;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #333;
  }
  .title { font-size: 1.1rem; color: #e63946; font-weight: 700; letter-spacing: 1px; }
  .stats { display: flex; gap: 14px; font-size: 0.9rem; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat .label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 1.05rem; font-weight: 700; }
  .lives { font-size: 1rem; letter-spacing: 1px; }
  .combo.active .value { color: #ffb703; }
  .question-type {
    display: inline-block;
    padding: 4px 12px;
    background: #e63946;
    color: #fff;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .question-card {
    text-align: center;
    padding: 32px 20px;
    background: #1a1a1a;
    border-radius: 12px;
    margin-bottom: 20px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border: 1px solid #2a2a2a;
    transition: all 0.3s;
  }
  .question-card.correct { border-color: #2dd4bf; background: rgba(45, 212, 191, 0.08); }
  .question-card.wrong { border-color: #e63946; background: rgba(230, 57, 70, 0.08); }
  .question-word { font-size: 2.8rem; font-weight: 700; margin-bottom: 12px; color: #fff; line-height: 1.2; }
  .question-hint { font-size: 0.95rem; color: #888; margin-bottom: 8px; }
  .input-area { display: flex; gap: 8px; }
  .input-area input {
    flex: 1; padding: 14px 16px; font-size: 1.1rem;
    background: #1a1a1a; border: 2px solid #333; border-radius: 8px;
    color: #fff; outline: none; font-family: inherit;
  }
  .input-area input:focus { border-color: #e63946; }
  .input-area button {
    padding: 14px 24px; background: #e63946; color: #fff;
    border: none; border-radius: 8px; font-size: 1rem;
    font-weight: 700; cursor: pointer; transition: all 0.1s;
  }
  .input-area button:hover { background: #c1121f; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice {
    padding: 16px; background: #1a1a1a; border: 2px solid #333;
    border-radius: 8px; color: #fff; font-size: 1.05rem;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    text-align: center;
  }
  .choice:hover:not(:disabled) { border-color: #e63946; background: #2a2a2a; }
  .choice:disabled { cursor: not-allowed; opacity: 0.6; }
  .choice.correct { border-color: #2dd4bf; background: rgba(45, 212, 191, 0.15); color: #2dd4bf; }
  .choice.wrong { border-color: #e63946; background: rgba(230, 57, 70, 0.15); color: #e63946; }
  .feedback {
    min-height: 48px; text-align: center; font-size: 0.95rem;
    margin-top: 12px; padding: 12px; border-radius: 8px; display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(45, 212, 191, 0.1); color: #2dd4bf; }
  .feedback.wrong { background: rgba(230, 57, 70, 0.1); color: #ff6b7a; }
  .feedback b { color: #fff; }
  .screen { display: none; }
  .screen.active { display: block; }
  .start-screen, .end-screen { text-align: center; padding: 10px 0; }
  .big-title {
    font-size: 2.2rem; font-weight: 900; margin-bottom: 6px;
    background: linear-gradient(135deg, #e63946, #ff6b7a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: #888; margin-bottom: 22px; font-size: 0.92rem; }
  .rules {
    text-align: left; background: #1a1a1a; padding: 16px 18px;
    border-radius: 12px; margin-bottom: 18px; font-size: 0.85rem;
    line-height: 1.7; color: #ccc;
  }
  .rules li { margin-left: 18px; }
  .rules b { color: #e63946; }
  .category-picker {
    text-align: left; background: #1a1a1a; padding: 16px;
    border-radius: 12px; margin-bottom: 18px;
  }
  .category-label {
    font-size: 0.85rem; color: #ccc; margin-bottom: 12px;
    font-weight: 700; letter-spacing: 0.5px;
  }
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
    gap: 8px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .category-grid::-webkit-scrollbar { width: 6px; }
  .category-grid::-webkit-scrollbar-track { background: #222; border-radius: 3px; }
  .category-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  .cat-btn {
    padding: 10px 6px; background: #242424; border: 2px solid #333;
    border-radius: 8px; color: #ccc; font-size: 0.88rem;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    text-align: center; line-height: 1.3;
  }
  .cat-btn:hover { border-color: #555; color: #fff; }
  .cat-btn.active {
    border-color: #e63946; background: rgba(230, 57, 70, 0.15);
    color: #ff6b7a; font-weight: 700;
  }
  .cat-btn .count { display: block; font-size: 0.7rem; color: #666; margin-top: 2px; }
  .cat-btn.active .count { color: #e63946; }
  .primary-btn {
    padding: 14px 42px; background: #e63946; color: #fff;
    border: none; border-radius: 999px; font-size: 1rem;
    font-weight: 700; cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .primary-btn:hover { background: #c1121f; transform: translateY(-2px); }
  .final-score { font-size: 3rem; font-weight: 900; color: #e63946; margin: 8px 0; }
  .record { color: #ffb703; font-size: 0.9rem; margin-bottom: 16px; }
  .record .new { font-weight: 700; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.3s; }
</style>
</head>
<body>
<div class="game">

  <!-- START -->
  <div id="start-screen" class="screen active start-screen">
    <div class="big-title">日本語チャレンジ</div>
    <div class="subtitle">JLPT N5~N4 일본어 단어 게임 · <span id="total-count">0</span>단어</div>

    <div class="category-picker">
      <div class="category-label">📚 공부할 카테고리를 선택하세요</div>
      <div class="category-grid" id="category-grid"></div>
    </div>

    <div class="rules">
      <div><b>❤️ 라이프 5개</b> — 0이 되면 게임 오버</div>
      <div>문제 유형 (랜덤):</div>
      <ul>
        <li><b>뜻 맞추기</b> 4지선다 (+10)</li>
        <li><b>한자 읽기</b> 4지선다 (+10)</li>
        <li><b>뜻 입력</b> 한국어 타이핑 (+15)</li>
      </ul>
      <div><b>🔥 3 콤보</b>마다 +20점 보너스!</div>
    </div>

    <button class="primary-btn" onclick="startGame()">게임 시작</button>
    <div id="best-record" class="record" style="margin-top:18px;"></div>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div class="header">
      <div class="title" id="game-title">日本語</div>
      <div class="stats">
        <div class="stat"><div class="label">라이프</div><div class="value lives" id="lives">❤️❤️❤️❤️❤️</div></div>
        <div class="stat"><div class="label">점수</div><div class="value" id="score">0</div></div>
        <div class="stat combo" id="combo-stat"><div class="label">콤보</div><div class="value" id="combo">0</div></div>
      </div>
    </div>

    <div id="q-type" class="question-type">문제</div>
    <div id="question-card" class="question-card">
      <div id="q-hint" class="question-hint"></div>
      <div id="q-word" class="question-word"></div>
    </div>

    <div id="answer-area"></div>
    <div id="feedback" class="feedback"></div>

    <div style="text-align:center; margin-top:16px;">
      <button onclick="backToStart()" style="background:none; border:none; color:#666; cursor:pointer; font-size:0.8rem; text-decoration:underline;">← 카테고리 변경</button>
    </div>
  </div>

  <!-- END -->
  <div id="end-screen" class="screen end-screen">
    <div class="big-title">게임 오버</div>
    <div class="subtitle">お疲れ様でした!</div>
    <div>최종 점수</div>
    <div id="final-score" class="final-score">0</div>
    <div id="final-record" class="record"></div>
    <div>맞힌 문제: <b id="final-correct">0</b> / <span id="final-total">0</span></div>
    <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <button class="primary-btn" onclick="startGame()">다시 도전</button>
      <button class="primary-btn" style="background:#444;" onclick="backToStart()">카테고리 변경</button>
    </div>
  </div>

</div>

// ===== State =====
let state = {
  lives: 5, score: 0, combo: 0,
  current: null, currentType: null,
  lastWordIdx: -1, correct: 0, total: 0,
  locked: false,
  activeWords: WORDS,
  category: 'all'
};
const BEST_KEY = 'jp_game_best_v3';

// ===== Helpers =====
function rand(n) { return Math.floor(Math.random() * n); }
function pickWord() {
  const pool = state.activeWords;
  if (pool.length === 0) return null;
  if (pool.length === 1) return pool[0];
  let idx;
  do { idx = rand(pool.length); } while (idx === state.lastWordIdx);
  state.lastWordIdx = idx;
  return pool[idx];
}
function pickDistractors(field, correctValue, n=3) {
  const pool = state.activeWords.filter(w => w[field] !== correctValue);
  const picked = [];
  const used = new Set();
  while (picked.length < n && picked.length < pool.length) {
    const w = pool[rand(pool.length)];
    if (!used.has(w[field])) { used.add(w[field]); picked.push(w[field]); }
  }
  if (picked.length < n) {
    const backup = WORDS.filter(w => w[field] !== correctValue && !used.has(w[field]));
    while (picked.length < n && backup.length) {
      const w = backup.splice(rand(backup.length), 1)[0];
      picked.push(w[field]);
    }
  }
  return picked;
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rand(i+1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function hasKanji(w) { return w.k !== w.h; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== Category Picker =====
function renderCategoryPicker() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = CATEGORIES.map(c => {
    const count = c.id === 'all' ? WORDS.length : WORDS.filter(w => w.cat === c.id).length;
    return `<button class="cat-btn${state.category === c.id ? ' active' : ''}" data-cat="${c.id}">
      ${c.label}<span class="count">${count}개</span>
    </button>`;
  }).join('');
  grid.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.category = btn.dataset.cat;
      localStorage.setItem('jp_game_cat', state.category);
      renderCategoryPicker();
      refreshBestRecord();
    });
  });
}

function backToStart() {
  showScreen('start-screen');
  renderCategoryPicker();
  refreshBestRecord();
}

// ===== Game Flow =====
function startGame() {
  const cat = state.category;
  const pool = cat === 'all' ? WORDS : WORDS.filter(w => w.cat === cat);
  state = {
    lives: 5, score: 0, combo: 0,
    current: null, currentType: null,
    lastWordIdx: -1, correct: 0, total: 0,
    locked: false,
    activeWords: pool,
    category: cat
  };
  const label = CATEGORIES.find(c => c.id === cat)?.label || '전체';
  document.getElementById('game-title').textContent = label;
  updateHUD();
  showScreen('game-screen');
  nextQuestion();
}

function updateHUD() {
  document.getElementById('lives').textContent =
    '❤️'.repeat(state.lives) + '🖤'.repeat(Math.max(0, 5 - state.lives));
  document.getElementById('score').textContent = state.score;
  document.getElementById('combo').textContent = state.combo;
  const cs = document.getElementById('combo-stat');
  if (state.combo >= 2) cs.classList.add('active'); else cs.classList.remove('active');
}

function nextQuestion() {
  state.locked = false;
  const word = pickWord();
  if (!word) { endGame(); return; }

  const r = Math.random();
  let type = r < 0.45 ? 'meaning' : (r < 0.85 ? 'reading' : 'typing');
  if (type === 'reading' && !hasKanji(word)) type = 'meaning';

  state.current = word;
  state.currentType = type;

  const card = document.getElementById('question-card');
  card.classList.remove('correct', 'wrong', 'shake');
  document.getElementById('feedback').classList.remove('show');

  const qType = document.getElementById('q-type');
  const qHint = document.getElementById('q-hint');
  const qWord = document.getElementById('q-word');
  const answerArea = document.getElementById('answer-area');

  if (type === 'typing') {
    qType.textContent = '⌨️ 뜻 입력 (+15)';
    qHint.textContent = '이 단어의 뜻을 한글로 입력하세요';
    qWord.textContent = hasKanji(word) ? `${word.k}（${word.h}）` : word.h;
    answerArea.innerHTML = `
      <div class="input-area">
        <input id="ans-input" type="text" autocomplete="off" spellcheck="false" placeholder="한국어 뜻...">
        <button onclick="submitTyping()">확인</button>
      </div>`;
    const inp = document.getElementById('ans-input');
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitTyping(); });
  } else if (type === 'meaning') {
    qType.textContent = '💭 뜻 맞추기 (+10)';
    qHint.textContent = '이 단어의 뜻은?';
    qWord.textContent = hasKanji(word) ? `${word.k}（${word.h}）` : word.h;
    const choices = shuffle([word.m, ...pickDistractors('m', word.m, 3)]);
    answerArea.innerHTML = '<div class="choices">' +
      choices.map(c => `<button class="choice" onclick='submitChoice(this, ${JSON.stringify(c)}, ${JSON.stringify(word.m)})'>${c}</button>`).join('') +
      '</div>';
  } else {
    qType.textContent = '🈵 한자 읽기 (+10)';
    qHint.textContent = '이 한자의 읽기는?';
    qWord.textContent = word.k;
    const choices = shuffle([word.h, ...pickDistractors('h', word.h, 3)]);
    answerArea.innerHTML = '<div class="choices">' +
      choices.map(c => `<button class="choice" onclick='submitChoice(this, ${JSON.stringify(c)}, ${JSON.stringify(word.h)})'>${c}</button>`).join('') +
      '</div>';
  }
}

function normalizeKo(s) { return s.trim().toLowerCase().replace(/[,\s.·・、,()（）]/g, ''); }

function submitTyping() {
  if (state.locked) return;
  const input = document.getElementById('ans-input');
  const val = input.value;
  if (!val.trim()) return;
  const user = normalizeKo(val);
  const answers = state.current.m.split(/[,、]/).map(normalizeKo);
  const correct = answers.some(a =>
    a === user || (user.length >= 2 && a.includes(user))
  );
  handleAnswer(correct, val.trim(), state.current.m, 15);
}

function submitChoice(btn, picked, correctAns) {
  if (state.locked) return;
  const correct = picked === correctAns;
  document.querySelectorAll('.choice').forEach(c => {
    c.disabled = true;
    if (c.textContent === correctAns) c.classList.add('correct');
    else if (c === btn && !correct) c.classList.add('wrong');
  });
  handleAnswer(correct, picked, correctAns, 10);
}

function handleAnswer(correct, given, answer, basePoints) {
  state.locked = true;
  state.total++;
  const card = document.getElementById('question-card');
  const fb = document.getElementById('feedback');

  if (correct) {
    state.correct++;
    state.combo++;
    let gained = basePoints;
    let bonusText = '';
    if (state.combo > 0 && state.combo % 3 === 0) {
      gained += 20;
      bonusText = ` <b>🔥 ${state.combo} 콤보 보너스 +20!</b>`;
    }
    state.score += gained;
    card.classList.add('correct');
    fb.className = 'feedback correct show';
    const w = state.current;
    const label = hasKanji(w) ? `${w.k}（${w.h}）` : w.h;
    fb.innerHTML = `✅ 정답! <b>+${gained}점</b> — ${label} = ${w.m}${bonusText}`;
  } else {
    state.combo = 0;
    state.lives--;
    card.classList.add('wrong', 'shake');
    fb.className = 'feedback wrong show';
    const w = state.current;
    const label = hasKanji(w) ? `${w.k}（${w.h}）` : w.h;
    fb.innerHTML = `❌ 오답! 정답: <b>${answer}</b> — ${label} = ${w.m}`;
  }
  updateHUD();

  setTimeout(() => {
    if (state.lives <= 0) endGame();
    else nextQuestion();
  }, correct ? 1100 : 1800);
}

function bestKey() { return BEST_KEY + '_' + state.category; }

function endGame() {
  document.getElementById('final-score').textContent = state.score;
  document.getElementById('final-correct').textContent = state.correct;
  document.getElementById('final-total').textContent = state.total;
  const key = bestKey();
  const best = parseInt(localStorage.getItem(key) || '0');
  const rec = document.getElementById('final-record');
  const catLabel = CATEGORIES.find(c => c.id === state.category)?.label || '전체';
  if (state.score > best) {
    localStorage.setItem(key, state.score);
    rec.innerHTML = `🏆 <span class="new">[${catLabel}] 신기록!</span> (이전: ${best}점)`;
  } else {
    rec.innerHTML = `🏆 [${catLabel}] 최고 기록: ${best}점`;
  }
  showScreen('end-screen');
}

function refreshBestRecord() {
  const key = BEST_KEY + '_' + state.category;
  const best = parseInt(localStorage.getItem(key) || '0');
  const catLabel = CATEGORIES.find(c => c.id === state.category)?.label || '전체';
  const el = document.getElementById('best-record');
  el.innerHTML = best > 0 ? `🏆 [${catLabel}] 최고 기록: <b>${best}점</b>` : '';
}

// ===== Init =====
(function init() {
  document.getElementById('total-count').textContent = WORDS.length;
  const savedCat = localStorage.getItem('jp_game_cat');
  if (savedCat && CATEGORIES.some(c => c.id === savedCat)) state.category = savedCat;
  renderCategoryPicker();
  refreshBestRecord();
})();
</script>
